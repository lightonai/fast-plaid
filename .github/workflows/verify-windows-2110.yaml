name: Verify Windows 2.11 Wheel

on:
  push:
    paths:
      - ".github/workflows/verify-windows-2110.yaml"
  workflow_dispatch:

jobs:
  verify:
    name: Verify fast-plaid==1.4.6.2110 on Windows py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install torch 2.11.0 and fast-plaid 1.4.6.2110
        run: |
          python -m pip install --upgrade pip
          python -m pip install torch==2.11.0
          python -m pip install fast-plaid==1.4.6.2110

      - name: List installed packages
        run: python -m pip list

      - name: Import fast-plaid (smoke test)
        run: |
          python -c "import torch; print('torch:', torch.__version__)"
          python -c "from fast_plaid import search; print('fast_plaid.search imported OK')"
          python -c "import torch; from fast_plaid import fast_plaid_rust; print('fast_plaid_rust imported OK')"
